[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
monitor_filters = time
lib_ldf_mode = deep+

lib_deps =
    jgromes/RadioLib
    bblanchon/ArduinoJson
    knolleary/PubSubClient@^2.8

build_flags =
    -D MQTT_MAX_PACKET_SIZE=512
