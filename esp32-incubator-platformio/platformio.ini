[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 9600
monitor_filters = time
lib_ldf_mode = deep+
build_flags =
    -D DEBUG_PRINT=Serial
; build_src_flags (not build_flags) so this only applies to our own files —
; not to bundled libraries, which don't have src/ on their include path and
; shouldn't have Serial redirected anyway.
build_src_flags =
    -include SerialLogger.h

lib_deps =
    adafruit/Adafruit INA260 Library
    adafruit/Adafruit BusIO
    https://github.com/Seeed-Studio/Grove_Digital_Light_Sensor.git
    https://github.com/Sensirion/arduino-i2c-scd4x.git
    https://github.com/Seeed-Studio/Multi_Channel_Relay_Arduino_Library.git
    olikraus/U8g2
    bogde/HX711
    https://github.com/Seeed-Studio/RTC_DS1307.git
    jgromes/RadioLib
